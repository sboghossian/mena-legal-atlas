      url: https://elaws.moj.gov.ae
      notes: Geo-blocked from non-UAE IPs.
      url_check:
        status: timeout
        code: null
        checked_at: '2026-05-16'
    apex_courts:
    - Federal Supreme Court
    - Court of Cassation (Dubai)
    - Court of Cassation (Abu Dhabi)
    - DIFC Courts (common-law, English-language)
    - ADGM Courts (common-law, English-language)
    key_regulators:
    - Central Bank (CBUAE) - rulebook.centralbank.ae
    - Securities and Commodities Authority (SCA)
    - Federal Tax Authority (FTA)
    - DFSA (DIFC financial regulator)
    - FSRA (ADGM financial regulator)
  worldwidelaw:
    working: 7
    blocked: 8
    dominant_blocker: cloudflare_WAF + geo_ip_block
  unblock_hints:
  - Federal MOJ portal is cloudflare-WAF gated; pursue MOU with MOJ Open Data team
    rather than scraping
  - Bayanat (data.bayanat.ae) sometimes hosts MOJ datasets — check periodically
  - SCA API requires CSRF auth — request a public API key via SCA contact form
  - TDRC tax appeals are protected by Tax Procedures Law Art 7 confidentiality — unscrapeable
    by design
  priority:
    haqq_icp: high
    tractability: low_for_federal_high_for_freezones
    upstream_gap: medium
  notes: Free zones (DIFC, ADGM) have the best open access. Federal is the hard part.
